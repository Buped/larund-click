<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        pointer-events: none;
      }
      .frame {
        position: fixed;
        inset: 0;
        box-sizing: border-box;
        border: 5px solid rgba(74, 158, 255, 0.95);
        border-radius: 3px;
        box-shadow:
          inset 0 0 22px rgba(74, 158, 255, 0.45),
          inset 0 0 4px rgba(74, 158, 255, 0.9);
        animation: glow 2.2s ease-in-out infinite;
      }
      @keyframes glow {
        0%, 100% { opacity: 0.6; }
        50%      { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="frame"></div>
  </body>
</html>
