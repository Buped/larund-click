<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo Invoice Portal — Invoices</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; font-size: 14px; }
    a.dl { color: #2563eb; }
    .latest { font-weight: 600; }
  </style>
</head>
<body>
  <h1>Your invoices</h1>
  <p style="color:#666;font-size:13px">Signed in as <span id="who">demo</span>. The latest invoice is at the top.</p>
  <table>
    <thead><tr><th>Date</th><th>Vendor</th><th>Amount</th><th>Download</th></tr></thead>
    <tbody>
      <tr class="latest">
        <td>2026-06-15</td><td>ACME Kft.</td><td>125 000 HUF</td>
        <td><a class="dl" id="download-latest" href="/portal/invoice.pdf" download>Download latest invoice (PDF)</a>
            &nbsp;·&nbsp;<a class="dl" href="/portal/invoice.txt" download>TXT</a></td>
      </tr>
      <tr>
        <td>2026-05-14</td><td>ACME Kft.</td><td>118 000 HUF</td>
        <td><span style="color:#999">archived</span></td>
      </tr>
    </tbody>
  </table>
</body>
</html>
