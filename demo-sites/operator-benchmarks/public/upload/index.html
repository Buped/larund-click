<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo Upload Page</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 460px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; }
    input[type=file] { display: block; margin: 16px 0; font-size: 14px; }
    #result { margin-top: 16px; font-weight: 600; color: #166534; min-height: 20px; }
    code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Upload a document</h1>
  <p style="color:#666;font-size:13px">browser_upload sets the file input over CDP; the name appears below — no mouse.</p>
  <input id="fileInput" name="file" type="file" onchange="onPick()">
  <div id="result">No file selected.</div>
  <script>
    function onPick() {
      const f = document.getElementById('fileInput').files[0];
      document.getElementById('result').textContent = f
        ? ('Upload received: ' + f.name + ' (' + f.size + ' bytes)')
        : 'No file selected.';
    }
  </script>
</body>
</html>
